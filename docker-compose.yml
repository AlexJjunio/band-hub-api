version: '3.8'

services:
  db:
    image: postgres:16
    container_name: band-hub-db
    environment:
      POSTGRES_USER: bandhub
      POSTGRES_PASSWORD: bandhub123
      POSTGRES_DB: bandhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: